---
- name: Fetch Bitwarden Secrets
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Fetch Karakeep NextAuth secret from Bitwarden
      shell: bws secret get "{{ karakeep_nextauth_secret_uuid }}" --access-token "{{ bws_access_token }}" --output json
      register: nextauth_secret_result
      no_log: true
      changed_when: false

    - name: Fetch Karakeep Meilisearch master key from Bitwarden
      shell: bws secret get "{{ karakeep_meili_master_key_uuid }}" --access-token "{{ bws_access_token }}" --output json
      register: meili_key_result
      no_log: true
      changed_when: false

    - name: Pass secrets to VPS host
      add_host:
        name: vps
        karakeep_nextauth_secret: "{{ (nextauth_secret_result.stdout | from_json).value }}"
        karakeep_meili_master_key: "{{ (meili_key_result.stdout | from_json).value }}"
      no_log: true

- name: Setup Karakeep on VPS
  hosts: vps
  become: true
  gather_facts: true

  vars:
    karakeep_dir: /opt/karakeep

  tasks:
    # Create karakeep user
    - name: Create karakeep system group
      group:
        name: karakeep
        system: true
        state: present

    - name: Create karakeep system user
      user:
        name: karakeep
        group: karakeep
        groups: docker
        system: true
        shell: /usr/sbin/nologin
        home: "{{ karakeep_dir }}"
        create_home: false
        state: present

    # Create directories
    - name: Create Karakeep directories
      file:
        path: "{{ item }}"
        state: directory
        owner: karakeep
        group: karakeep
        mode: '0750'
      loop:
        - "{{ karakeep_dir }}"
        - "{{ karakeep_dir }}/data"

    # Deploy configuration files
    - name: Template Docker Compose file
      template:
        src: templates/karakeep-compose.yaml.j2
        dest: "{{ karakeep_dir }}/docker-compose.yaml"
        owner: karakeep
        group: karakeep
        mode: '0640'

    # Start Karakeep
    - name: Pull Karakeep image
      command: docker compose pull
      args:
        chdir: "{{ karakeep_dir }}"
      changed_when: false

    - name: Start Karakeep container
      command: docker compose up -d
      args:
        chdir: "{{ karakeep_dir }}"
      register: up_result
      changed_when: up_result.stderr is search('Started') or up_result.stderr is search('Created')

    - name: Wait for Karakeep to be ready
      uri:
        url: "http://127.0.0.1:9721"
        status_code: 200
      register: health_check
      retries: 10
      delay: 3
      until: health_check.status == 200

    - name: Verify Karakeep container is running
      command: docker compose ps --format json
      args:
        chdir: "{{ karakeep_dir }}"
      register: compose_ps
      changed_when: false
