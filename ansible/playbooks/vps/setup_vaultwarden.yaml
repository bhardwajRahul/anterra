---
- name: Fetch Bitwarden Secrets
  hosts: localhost
  connection: local
  gather_facts: false
  tags: always
  tasks:
    - name: Fetch Vaultwarden admin token from Bitwarden
      shell: bws secret get "{{ vaultwarden_admin_token_uuid }}" --access-token "{{ bws_access_token }}" --output json
      register: admin_token_result
      no_log: true
      changed_when: false

    - name: Fetch SMTP from address from Bitwarden
      shell: bws secret get "{{ vaultwarden_smtp_from_uuid }}" --access-token "{{ bws_access_token }}" --output json
      register: smtp_from_result
      no_log: true
      changed_when: false

    - name: Fetch SMTP username from Bitwarden
      shell: bws secret get "{{ vaultwarden_smtp_username_uuid }}" --access-token "{{ bws_access_token }}" --output json
      register: smtp_username_result
      no_log: true
      changed_when: false

    - name: Fetch SMTP password from Bitwarden
      shell: bws secret get "{{ vaultwarden_smtp_password_uuid }}" --access-token "{{ bws_access_token }}" --output json
      register: smtp_password_result
      no_log: true
      changed_when: false

    - name: Fetch push installation ID from Bitwarden
      shell: bws secret get "{{ vaultwarden_push_installation_id_uuid }}" --access-token "{{ bws_access_token }}" --output json
      register: push_id_result
      no_log: true
      changed_when: false

    - name: Fetch push installation key from Bitwarden
      shell: bws secret get "{{ vaultwarden_push_installation_key_uuid }}" --access-token "{{ bws_access_token }}" --output json
      register: push_key_result
      no_log: true
      changed_when: false

    - name: Pass secrets to VPS host
      add_host:
        name: vps
        vaultwarden_admin_token: "{{ (admin_token_result.stdout | from_json).value }}"
        vaultwarden_smtp_from: "{{ (smtp_from_result.stdout | from_json).value }}"
        vaultwarden_smtp_username: "{{ (smtp_username_result.stdout | from_json).value }}"
        vaultwarden_smtp_password: "{{ (smtp_password_result.stdout | from_json).value }}"
        vaultwarden_push_installation_id: "{{ (push_id_result.stdout | from_json).value }}"
        vaultwarden_push_installation_key: "{{ (push_key_result.stdout | from_json).value }}"
      no_log: true

- name: Setup Vaultwarden on VPS
  hosts: vps
  become: true
  gather_facts: true

  vars:
    vaultwarden_dir: /opt/vaultwarden

  tasks:
    # Install Docker Engine
    - name: Install Docker dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Add Docker GPG key
      apt_key:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    # Create vaultwarden user
    - name: Create vaultwarden system group
      group:
        name: vaultwarden
        system: true
        state: present

    - name: Create vaultwarden system user
      user:
        name: vaultwarden
        group: vaultwarden
        groups: docker
        system: true
        shell: /usr/sbin/nologin
        home: "{{ vaultwarden_dir }}"
        create_home: false
        state: present

    # Create directories
    - name: Create Vaultwarden directories
      file:
        path: "{{ item }}"
        state: directory
        owner: vaultwarden
        group: vaultwarden
        mode: '0750'
      loop:
        - "{{ vaultwarden_dir }}"
        - "{{ vaultwarden_dir }}/data"

    # Deploy configuration files
    - name: Template Docker Compose file
      template:
        src: templates/vaultwarden-compose.yaml.j2
        dest: "{{ vaultwarden_dir }}/docker-compose.yaml"
        owner: vaultwarden
        group: vaultwarden
        mode: '0640'

    - name: Template environment file
      template:
        src: templates/vaultwarden.env.j2
        dest: "{{ vaultwarden_dir }}/.env"
        owner: vaultwarden
        group: vaultwarden
        mode: '0600'
      no_log: true

    # Start Vaultwarden
    - name: Pull Vaultwarden image
      command: docker compose pull
      args:
        chdir: "{{ vaultwarden_dir }}"
      changed_when: false

    - name: Start Vaultwarden container
      command: docker compose up -d
      args:
        chdir: "{{ vaultwarden_dir }}"
      register: up_result
      changed_when: up_result.stderr is search('Started') or up_result.stderr is search('Created')

    - name: Wait for Vaultwarden to be ready
      uri:
        url: "http://127.0.0.1:8080"
        status_code: 200
      register: health_check
      retries: 10
      delay: 3
      until: health_check.status == 200

    - name: Verify Vaultwarden container is running
      command: docker compose ps --format json
      args:
        chdir: "{{ vaultwarden_dir }}"
      register: compose_ps
      changed_when: false
